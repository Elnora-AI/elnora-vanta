# CodeQL Security Scanning
#
# SAST for this TypeScript codebase using GitHub's CodeQL engine.
# Evidence: Security tab > Code scanning alerts

name: CodeQL Security Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly on Sundays at 3:00 AM UTC
    - cron: '0 3 * * 0'
  workflow_dispatch:

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze TypeScript
    # Code scanning is unavailable while the repo is private (no GHAS), so gate
    # push/PR runs on visibility. `schedule` payloads carry no repository object,
    # so the weekly run is ungated — it fails harmlessly until the public flip.
    if: ${{ github.event_name == 'schedule' || !github.event.repository.private }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v7
      - uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          queries: security-extended
      - uses: github/codeql-action/autobuild@v4
      - uses: github/codeql-action/analyze@v4
        with:
          category: "/language:javascript-typescript"
