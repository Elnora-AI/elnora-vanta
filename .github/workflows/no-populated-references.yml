name: Publication Guard

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: publication-guard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: No credentials, posture data, or populated references
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - run: node scripts/check-no-populated-references.mjs
